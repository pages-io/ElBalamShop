<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miaurot | Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        :root { --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); --apple-black: #000000; }
        body { font-family: 'Inter', sans-serif; background-color: var(--apple-black); color: #ffffff; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; transition: all 0.4s ease; }
        .input-apple { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px 16px; color: white; outline: none; }
        .btn-apple { background: #ffffff; color: #000000; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-apple:hover { opacity: 0.9; transform: scale(0.98); }
        .btn-cancel { background: rgba(255, 255, 255, 0.1); color: #ffffff; padding: 12px 24px; border-radius: 12px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .card-locked { filter: grayscale(1) brightness(0.2); position: relative; }
        .card-locked::after { content: '🔒'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; opacity: 0.3; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #toast-container { position: fixed; top: 2rem; right: 2rem; z-index: 200; display: flex; flex-direction: column; gap: 0.75rem; pointer-events: none; }
        .toast { pointer-events: auto; min-width: 250px; padding: 1rem 1.25rem; border-radius: 16px; background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); color: white; display: flex; align-items: center; gap: 0.75rem; animation: slideIn 0.4s forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-exit { animation: slideOut 0.4s forwards; }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <nav class="sticky top-0 z-50 px-6 py-4 flex justify-between items-center glass m-4 mb-2 text-white">
        <div class="text-2xl font-semibold tracking-tight">Miaurot</div>
        <div class="text-sm opacity-40 font-medium">Portal Cliente</div>
    </nav>

    <main id="main-content" class="flex-grow container mx-auto px-6 py-8">
        <div class="flex items-center justify-center h-full py-20 opacity-20 text-white"><div class="text-xl">Sincronizando...</div></div>
    </main>

    <footer class="mt-auto py-12 px-6 border-t border-white/10 glass mx-4 mb-4 rounded-3xl text-white opacity-40 text-sm text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-4">
        <div>© 2026 ElBalam Shop. Todos los derechos reservados.</div>
        <div class="flex gap-6"><a href="#">Privacidad</a><a href="#">Términos</a></div>
    </footer>

    <!-- Ajuste: Añadida clase 'flex' para permitir el centrado -->
    <div id="modal-container" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="glass w-full max-w-lg p-8 fade-in relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRSUezzXCAOo33o5Q49VeWMhPqNpZBCfM",
            authDomain: "miaurot-cards-elbalamshop.firebaseapp.com",
            projectId: "miaurot-cards-elbalamshop",
            storageBucket: "miaurot-cards-elbalamshop.firebasestorage.app",
            messagingSenderId: "16177368965",
            appId: "1:16177368965:web:cc26a15dc7dcedf135beec",
            measurementId: "G-7XG9YP094T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'miaurot-cards-prod';

        window.state = { currentTab: 'inicio', loggedUser: null, db: { clients: [], cards: [], gifts: [], usedCodes: [] } };
        let slideshowTimer = null, currentSlideshowIndex = 0;

        window.setTab = (tab) => { window.state.currentTab = tab; render(); };
        window.closeModal = () => document.getElementById('modal-container').classList.add('hidden');
        const openModal = (html) => { document.getElementById('modal-content').innerHTML = html; document.getElementById('modal-container').classList.remove('hidden'); lucide.createIcons(); };

        window.showToast = (msg, type = 'success') => {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i data-lucide="${type==='success'?'check-circle':'alert-circle'}" class="${type==='success'?'text-green-400':'text-red-400'} w-5 h-5"></i><span class="text-sm font-medium">${msg}</span>`;
            document.getElementById('toast-container').appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.classList.add('toast-exit'); setTimeout(() => toast.remove(), 400); }, 3000);
        };

        window.showConfirm = (title, msg, onConfirm) => {
            openModal(`<div class="text-center"><h3 class="text-xl font-bold mb-4 text-white">${title}</h3><p class="text-white/60 mb-8">${msg}</p><div class="flex gap-4 justify-center"><button onclick="closeModal()" class="btn-cancel">Cancelar</button><button id="m-confirm" class="btn-apple">Confirmar</button></div></div>`);
            document.getElementById('m-confirm').onclick = () => { onConfirm(); closeModal(); };
        };

        signInAnonymously(auth).catch(console.error);
        onAuthStateChanged(auth, (user) => { if (user) setupListeners(); });

        const setupListeners = () => {
            const root = `artifacts/${appId}/public/data/`;
            onSnapshot(collection(db, root + 'clients'), (snap) => {
                window.state.db.clients = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                const sid = localStorage.getItem('miaurot_session_id');
                if (sid) {
                    const found = window.state.db.clients.find(c => String(c.id) === String(sid));
                    if (found) window.state.loggedUser = found;
                }
                render();
            });
            onSnapshot(collection(db, root + 'cards'), (snap) => { window.state.db.cards = snap.docs.map(d => ({ ...d.data(), id: d.id })); render(); });
            onSnapshot(collection(db, root + 'gifts'), (snap) => { window.state.db.gifts = snap.docs.map(d => ({ ...d.data(), id: d.id })); render(); });
            onSnapshot(collection(db, root + 'usedCodes'), (snap) => { window.state.db.usedCodes = snap.docs.map(d => d.data()); render(); });
        };

        window.handleLogin = () => {
            const id = document.getElementById('login-id').value.trim().toUpperCase();
            const client = window.state.db.clients.find(c => String(c.id) === String(id));
            if(client) { window.state.loggedUser = client; localStorage.setItem('miaurot_session_id', id); window.showToast(`Bienvenido`); render(); }
            else window.showToast("ID no encontrado", "error");
        };

        window.logout = () => {
            window.showConfirm("¿Cerrar sesión?", "¿Estás seguro?", () => {
                clearInterval(slideshowTimer); window.state.loggedUser = null; localStorage.removeItem('miaurot_session_id'); render();
            });
        };

        window.handleRegisterCard = async () => {
            const code = document.getElementById('c-code-input').value.trim().toUpperCase();
            if(!code) return;
            if(window.state.db.usedCodes.some(u => u.code === code)) { window.showToast("Código ya usado", "error"); return; }
            const card = window.state.db.cards.find(c => c.validCodes.includes(code));
            if(card) {
                if((window.state.loggedUser.activeSlots || []).length >= 5) { window.showToast("Slots llenos", "error"); return; }
                const updatedUser = { ...window.state.loggedUser };
                if(!updatedUser.activeSlots) updatedUser.activeSlots = [];
                if(!updatedUser.collection) updatedUser.collection = [];
                updatedUser.activeSlots.push({ id: String(card.id) });
                const cardIdStr = String(card.id);
                if (!updatedUser.collection.map(String).includes(cardIdStr)) updatedUser.collection.push(cardIdStr);
                await setDoc(doc(db, `artifacts/${appId}/public/data/clients/${updatedUser.id}`), updatedUser);
                await setDoc(doc(db, `artifacts/${appId}/public/data/usedCodes/${code}_${updatedUser.id}`), { code, userId: updatedUser.id });
                window.showToast("Carta registrada");
                document.getElementById('c-code-input').value = '';
            } else window.showToast("Código inválido", "error");
        };

        window.claimGift = async (i) => {
            const g = window.state.db.gifts[i];
            if((window.state.loggedUser.activeSlots || []).length < 5) { window.showToast("Faltan cartas", "error"); return; }
            if(g.stock <= 0) { window.showToast("Sin existencias", "error"); return; }
            window.showConfirm("¿Confirmar canje?", `¿Deseas canjear tus 5 cartas por "${g.name}"?`, async () => {
                await setDoc(doc(db, `artifacts/${appId}/public/data/gifts/${g.id}`), { ...g, stock: g.stock - 1 });
                await setDoc(doc(db, `artifacts/${appId}/public/data/clients/${window.state.loggedUser.id}`), { ...window.state.loggedUser, activeSlots: [] });
                window.showToast("¡Felicidades!");
            });
        };

        const render = () => {
            const main = document.getElementById('main-content');
            if(!window.state.loggedUser) {
                main.innerHTML = `<div class="max-w-md mx-auto glass p-12 text-center fade-in text-white"><h1 class="text-3xl font-bold mb-8 italic tracking-tight">Miaurot</h1><p class="opacity-60 mb-8 text-sm text-white/60">Ingresa tu ID de usuario para ver tu progreso.</p><input type="text" id="login-id" placeholder="EBSCFXXXXXXXXXX" class="input-apple w-full text-center font-mono uppercase tracking-widest mb-6"><button onclick="handleLogin()" class="btn-apple w-full font-bold">Ingresar</button></div>`;
                return;
            }
            main.innerHTML = `<div class="fade-in text-white"><div class="flex flex-wrap gap-8 mb-12 border-b border-white/10 pb-4 items-center"><button onclick="setTab('inicio')" class="text-xl font-medium ${window.state.currentTab === 'inicio' ? 'text-white border-b-2' : 'opacity-40 text-white'} transition">Inicio</button><button onclick="setTab('coleccion')" class="text-xl font-medium ${window.state.currentTab === 'coleccion' ? 'text-white border-b-2' : 'opacity-40 text-white'} transition">Colección</button><button onclick="setTab('reclamar')" class="text-xl font-medium ${window.state.currentTab === 'reclamar' ? 'text-white border-b-2' : 'opacity-40 text-white'} transition">Regalos</button><button onclick="logout()" class="ml-auto flex items-center gap-2 opacity-40 hover:opacity-100 text-sm"><i data-lucide="log-out" class="w-4 h-4"></i> Salir</button></div><div id="tab-content"></div></div>`;
            const tab = document.getElementById('tab-content');
            if (window.state.currentTab === 'inicio') renderInicio(tab);
            else if (window.state.currentTab === 'coleccion') renderColeccion(tab);
            else renderReclamar(tab);
            lucide.createIcons();
        };

        const renderInicio = (tab) => {
            const cards = window.state.db.cards;
            tab.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-12 text-white">
                <div><h2 class="text-4xl font-bold mb-4">Hola, ${window.state.loggedUser.name.split(' ')[0]}</h2><p class="text-lg opacity-70 mb-8 leading-relaxed italic text-white/80">"Miaurot" es un ecosistema exclusivo diseñado para recompensar tu fidelidad. Cada compra te otorga códigos especiales que puedes transformar en cartas únicas. Colecciónalas y canjea tus logros por regalos diseñados para ti.</p>
                <div class="flex md:hidden justify-center mb-8"><div class="glass-card p-2 w-40 shadow-xl"><img id="m-slide" class="w-full aspect-[2/3] object-cover rounded-lg" src="${cards[0]?.image || ''}" referrerpolicy="no-referrer"></div></div>
                <div class="flex gap-2 md:gap-4 mb-10 overflow-x-auto pb-2">${Array(5).fill(0).map((_, i) => {
                    const slot = window.state.loggedUser.activeSlots?.[i];
                    const fresh = slot ? window.state.db.cards.find(x => String(x.id) === String(slot.id)) : null;
                    return `<div class="min-w-[70px] md:w-full aspect-[2/3] glass-card flex items-center justify-center border border-white/10 overflow-hidden">${fresh ? `<img src="${fresh.image}" referrerpolicy="no-referrer" class="w-full h-full object-cover">` : '<i data-lucide="sparkles" class="opacity-10 w-5 h-5"></i>'}</div>`;
                }).join('')}</div>
                <div class="flex gap-4"><input type="text" id="c-code-input" placeholder="Ingresa código de carta" class="input-apple flex-grow font-mono uppercase tracking-widest"><button onclick="handleRegisterCard()" class="btn-apple font-bold">Registrar</button></div>
                ${(window.state.loggedUser.activeSlots || []).length === 5 ? '<p class="mt-4 text-green-400 font-bold fade-in">¡Completado! Ve a la pestaña de Regalos.</p>' : ''}</div>
                <div class="hidden md:flex flex-col items-center justify-center"><div class="glass-card p-4 w-64 rotate-3 shadow-2xl"><img id="pc-slide" class="w-full aspect-[2/3] object-cover rounded-lg transition-opacity duration-500" src="${cards[0]?.image || ''}" referrerpolicy="no-referrer"></div></div></div>`;
            
            if (cards.length > 1) {
                clearInterval(slideshowTimer);
                slideshowTimer = setInterval(() => {
                    currentSlideshowIndex = (currentSlideshowIndex + 1) % cards.length;
                    const imgs = [document.getElementById('m-slide'), document.getElementById('pc-slide')];
                    imgs.forEach(img => { if(img) { img.style.opacity = '0'; setTimeout(() => { if(img) { img.src = cards[currentSlideshowIndex].image; img.style.opacity = '1'; } }, 500); } });
                }, 5000);
            }
        };

        const renderColeccion = (tab) => {
            const cards = [...window.state.db.cards].sort((a,b) => a.number - b.number);
            const owned = (window.state.loggedUser.collection || []).map(String);
            const count = cards.filter(c => owned.includes(String(c.id))).length;
            tab.innerHTML = `<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4"><h2 class="text-2xl font-bold">Tu Galería</h2><span class="text-xs md:text-sm font-bold bg-white/10 px-4 py-2 rounded-full border border-white/10">Cartas desbloqueadas [${count}/${cards.length}]</span></div>
            <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-4 md:gap-6">${cards.map(c => `<div><div class="glass-card aspect-[2/3] overflow-hidden mb-2 ${owned.includes(String(c.id)) ? '' : 'card-locked'}"><img src="${c.image}" referrerpolicy="no-referrer" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x600?text=Card'"></div><p class="text-[10px] text-center opacity-40 uppercase tracking-widest">#${c.number} ${c.name}</p></div>`).join('')}</div>`;
        };

        const renderReclamar = (tab) => {
            const ready = (window.state.loggedUser.activeSlots || []).length === 5;
            tab.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-3 gap-8">${window.state.db.gifts.map((g, i) => `<div class="glass-card overflow-hidden group cursor-pointer" onclick="claimGift(${i})"><div class="h-48 overflow-hidden"><img src="${g.image}" referrerpolicy="no-referrer" class="w-full h-full object-cover group-hover:scale-110 transition duration-700"></div><div class="p-6"><h3 class="text-xl font-bold mb-2">${g.name}</h3><div class="flex justify-between items-center"><span class="text-xs opacity-50">Stock: ${g.stock}</span><button class="px-4 py-2 rounded-lg text-xs font-bold uppercase ${ready && g.stock > 0 ? 'bg-white text-black' : 'bg-white/10 text-white/30'}">Reclamar (5)</button></div></div></div>`).join('')}</div>`;
        };

        render();
    </script>
</body>
</html>
